<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Rapids Rafting for reservations, questions, and adventure information.">
    <meta name="author" content="Emmanuel Afolabi">
    <title>Contact Us | Rapids Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapids Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <section class="contact-info">
            <h2>Company Information</h2>

            <p>📍 Broad Street, Monrovia, Liberia</p>
            <p>📞 +231 881 518 106</p>
            <p>✉️ info@rapidsrafting.com</p>
        </section>

        <section class="contact-grid">

            <div class="map">
                <h2>Our Location</h2>

                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63452.123711937944!2d-10.810878142324786!3d6.295535601565984!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xf09f803d4a9fcc1%3A0x5b6c4dd7069694af!2sMonrovia%2C%20Liberia!5e0!3m2!1sen!2s!4v1780847856204!5m2!1sen!2s"
                  loading="lazy">
                </iframe>
            </div>

            <form>

                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <p><strong>Purpose of Message</strong></p>

                <div>
                    <input type="radio" id="general" name="purpose" value="general">
                    <label for="general">General Inquiry</label>
                </div>

                <div>
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>
                </div>

                <div>
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <div>
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit">Send Message</button>

            </form>

        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Lead Guide">
                <figcaption>John Smith Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Operations Manager">
                <figcaption>Emmanuel Afolabi Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Customer Service Manager">
                <figcaption>Sarah Johnson Customer Service Manager</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>© 2026 Rapids Rafting | Emmanuel Afolabi</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Social Media Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Social Media Icon">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter Social Media Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
